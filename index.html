<!DOCTYPE html>
<html>
<head>
    <title>Advanced Study Timer</title>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; text-align: center; padding: 50px; }
        #box { border: 2px solid #0f0; padding: 20px; border-radius: 15px; display: inline-block; min-width: 320px; box-shadow: 0 0 20px #000; }
        button { background: #0f0; color: #000; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; margin: 10px; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #0c0; transform: scale(1.05); }
        #answer { font-size: 42px; color: white; margin-top: 20px; font-weight: bold; min-height: 50px; }
        .stealth { color: #333; font-size: 10px; margin-bottom: 10px; }
        #status { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div id="box">
        <div class="stealth">GROQ_ENGINE_V2.2</div>
        <div id="status">SCANNER_READY</div>
        <button onclick="startCapture()">SYNC TAB</button>
        <button onclick="solve()">SOLVE_FRAME</button>
        <div id="answer">---</div>
    </div>

    <script>
        let stream = null;
        const k_name = 'nn_groq_key';

        async function startCapture() {
            try {
                stream = await navigator.mediaDevices.getDisplayMedia({ video: { displaySurface: "browser" } });
                document.getElementById('status').innerText = "LINK_ESTABLISHED";
            } catch (e) { alert("Link Failed: " + e.message); }
        }

        async function solve() {
        let k = localStorage.getItem(k_name);
        if (!k) {
            k = prompt("Enter Groq API Key:");
            if (k) localStorage.setItem(k_name, k);
            else return;
        }

        if (!stream) { alert("Click SYNC TAB first!"); return; }

        const status = document.getElementById('status');
        const ansBox = document.getElementById('answer');
        status.innerText = "THINKING...";
        
        try {
            const v = document.createElement('video');
            v.srcObject = stream;
            await v.play();
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            const b64 = c.toDataURL('image/jpeg', 0.6);

            const url = "https://api.groq.com/openai/v1/chat/completions";
            const res = await fetch(url, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${k}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "meta-llama/llama-4-scout-17b-16e-instruct",
                    messages: [
                        { 
                            role: "system", 
                            content: "You are a competitive math solver. You must output ONLY the raw numerical value or the coordinate pair. Do not use Markdown, do not show steps, and do not use wordy explanations. If the answer is -6, just say -6." 
                        },
                        { 
                            role: "user", 
                            content: [
                                { type: "text", text: "Final answer only." },
                                { type: "image_url", image_url: { url: b64 } }
                            ] 
                        }
                    ],
                    temperature: 0.0, // Set to 0 for absolute precision
                    max_tokens: 15    // This physically stops it from writing steps
                })
            });

            const d = await res.json();
            
            if (d.error) {
                status.innerText = "API_ERROR";
                alert("Groq Error: " + d.error.message);
                return;
            }

            const a = d.choices[0].message.content.trim();
            ansBox.innerText = a;
            status.innerText = "DONE";
        } catch (e) {
            status.innerText = "CRASH";
            alert("Crash: " + e.message);
        }
    }
    </script>
</body>
</html>
